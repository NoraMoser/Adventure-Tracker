<svg width="1024" height="1024" viewBox="0 0 1024 1024" xmlns="http://www.w3.org/2000/svg">
  <!-- Transparent/blank background - no fill -->
  
  <!-- Tree trunk (navy) - scaled up and positioned to touch triangle -->
  <rect x="412" y="600" width="200" height="240" fill="#1e3a5f" rx="8"/>
  
  <!-- Tree foliage (forest green triangle with burnt orange border) -->
  <g>
    <!-- Orange border - uniform width -->
    <path d="M 512 120 L 880 620 L 144 620 Z" 
          fill="none" 
          stroke="#cc5500" 
          stroke-width="40" 
          stroke-linejoin="round"/>
    <!-- Green interior -->
    <path d="M 512 120 L 880 620 L 144 620 Z" 
          fill="#2d5a3d"/>
  </g>
</svg>